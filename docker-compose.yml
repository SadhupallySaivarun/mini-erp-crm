version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: mini_erp_crm
    ports:
      - "5432:5432"
    volumes:
      - erp_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d mini_erp_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://erp_user:erp_password@postgres:5432/mini_erp_crm?schema=public
      JWT_SECRET: change-this-in-production
      JWT_EXPIRES_IN: 1d
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - "5000:5000"
    command: sh -c "npx prisma db push --accept-data-loss && npx prisma db seed && node dist/server.js"

  client:
    build:
      context: ./client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:5000/api/v1
    ports:
      - "5173:80"

volumes:
  erp_pg_data:
